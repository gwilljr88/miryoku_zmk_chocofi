# Enable ZMK Studio (Required)
CONFIG_ZMK_STUDIO=y

# Enable USB HID (Required for USB connection)
CONFIG_ZMK_USB=y

CONFIG_ZMK_STUDIO_LOCKING=n

# Enable Bluetooth
CONFIG_BT=y
CONFIG_ZMK_BLE=y

# Set the maximum number of paired devices (nice_view expects this)
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# Enable the display
CONFIG_ZMK_DISPLAY=y
